name: CD

# Executa em todo push para `main` (após merge de `dev` ou `hotfix/*`). Segue os
# mesmos gates do CI (lint -> typecheck -> test) e, se tudo passar, valida que o
# projeto constrói via `docker compose` da raiz e publica a release. Garante que
# quem recebe um release só precise de `docker compose up`, sem rodar npm nem
# comandos manuais. Build apenas (sem push pra registry — alinhado ao T2). Ver
# ADR-0012.
on:
  push:
    branches:
      - main

# O código do T3 vive em eloo-metrics-mfe/ (o repo também guarda forks e refs).
defaults:
  run:
    working-directory: eloo-metrics-mfe

jobs:
  lint:
    name: Lint (ESLint) + Format (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eloo-metrics-mfe/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eloo-metrics-mfe/package-lock.json
      - run: npm ci
      - run: npx tsc -b

  test:
    name: Testes (Vitest, cobertura >= 80%)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eloo-metrics-mfe/package-lock.json
      - run: npm ci
      - run: npm run test:cov

  build:
    name: Build da imagem (docker compose build)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      # Constrói a imagem do remote de métricas via docker-compose da raiz.
      # Falha aqui bloqueia o release com status vermelho.
      - name: Build via docker compose da raiz
        run: docker compose build

  release:
    name: Release (versão beta — MVP)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      # Publica a release beta quando tudo está verde na main. Idempotente: se a
      # tag já existe, não recria (não falha o pipeline). Não é 1.0 — é um MVP.
      - name: Publica a release beta (idempotente)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.1.0-beta
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG já existe — nada a fazer."
          else
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "Metrics MFE (T3) $TAG (MVP)" \
              --prerelease \
              --notes "Versão **beta** (MVP) do microfrontend de métricas do T3 (Grupo 0x).

          Entrega o remote \`mfeMetrics\` (Module Federation) montável pelo eloo-shell:
          dashboards de engajamento/certificação, catálogo, detalhe de evento e
          distribuições demográficas, consumindo a API do Metrics (T2) via camada
          de serviço com RBAC e tratamento de erros. Sobe via \`docker compose up\`
          (backends T1/T2 externos), sem rodar npm manualmente.

          **Por que beta e não 1.0:** \`vite preview\` serve o MVP (não é servidor
          de produção — ADR-0012), e o fluxo ponta-a-ponta depende de T1/T2 e do
          shell subirem à parte. Aceitável para a entrega da disciplina."
          fi
