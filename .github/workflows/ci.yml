name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# O código do projeto vive em eloo-metrics-mfe/ (o repo também guarda forks e
# referências). Todos os jobs rodam a partir dessa pasta.
defaults:
  run:
    working-directory: eloo-metrics-mfe

jobs:
  lint:
    name: Lint (ESLint) + Format (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eloo-metrics-mfe/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eloo-metrics-mfe/package-lock.json
      - run: npm ci
      - run: npx tsc -b

  test:
    name: Testes (Vitest, cobertura >= 80%)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eloo-metrics-mfe/package-lock.json
      - run: npm ci
      - run: npm run test:cov

  e2e:
    name: E2E (Playwright, mock)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eloo-metrics-mfe/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eloo-metrics-mfe/package-lock.json
      - run: npm ci
      - run: npm run build
